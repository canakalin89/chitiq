
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChitIQ - Speaking Evaluator</title>
    <link rel="icon" type="image/png" href="https://azizsancaranadolu.meb.k12.tr/meb_iys_dosyalar/59/11/765062/dosyalar/2025_11/03215750_speaksmartaltlogo.png" />

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Theme Initialization -->
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (localTheme === 'dark' || !localTheme) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>

    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 3px; }
      .dark ::-webkit-scrollbar-thumb { background: #4c1d95; }
      ::-webkit-scrollbar-thumb:hover { background: #a78bfa; }

      /* Base Card — white, rounded-2xl, subtle shadow */
      .card {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 2px 12px rgba(109, 40, 217, 0.06), 0 1px 3px rgba(0,0,0,0.04);
        border: none;
      }
      .dark .card {
        background: #1e1b2e;
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      }

      /* Legacy .glass → same as .card for backward compat */
      .glass {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 2px 12px rgba(109, 40, 217, 0.06), 0 1px 3px rgba(0,0,0,0.04);
      }
      .dark .glass {
        background: #1e1b2e;
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      }

      /* Sidebar slide-in animation */
      @keyframes slideInLeft {
        from { transform: translateX(-100%); }
        to   { transform: translateX(0); }
      }
      .animate-slide-in-left {
        animation: slideInLeft 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Fade-in */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.25s ease forwards; }

      /* Bounce-in (for hero elements) */
      @keyframes bounceIn {
        0%   { opacity: 0; transform: scale(0.85) translateY(12px); }
        60%  { opacity: 1; transform: scale(1.03) translateY(-4px); }
        100% { transform: scale(1) translateY(0); }
      }
      .animate-bounce-in { animation: bounceIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

      /* Slide-up (for modals) */
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up { animation: slideUp 0.3s ease forwards; }

      /* Confetti */
      @keyframes confettiFall {
        0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }
      .animate-confetti { animation: confettiFall 3s ease-out forwards; }

      /* Pop-in for staggered items */
      @keyframes popIn {
        from { opacity: 0; transform: scale(0.9); }
        to   { opacity: 1; transform: scale(1); }
      }
      .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

      /* Wave bars (evaluating screen) */
      @keyframes waveBar {
        0%, 100% { transform: scaleY(0.12); }
        50%       { transform: scaleY(1); }
      }
      .wave-bar { transform-origin: center; animation: waveBar 1.2s ease-in-out infinite; }

      /* Print */
      @media print {
        @page { size: A4; margin: 0.5cm; }
        body {
          background: white !important; color: black !important;
          margin: 0 !important; padding: 0 !important;
          height: auto !important; min-height: 0 !important;
        }
        #root { height: auto !important; min-height: 0 !important; }
        .fixed, .absolute-blob { display: none !important; }
      }
    </style>
</head>
  <body class="bg-[#f0eeff] text-slate-900 dark:bg-[#13111f] dark:text-slate-100 antialiased transition-colors duration-300 font-sans selection:bg-violet-200 selection:text-violet-900 dark:selection:bg-violet-900/40 dark:selection:text-violet-200">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
