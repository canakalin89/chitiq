
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChitIQ - Speaking Evaluator</title>
    <link rel="icon" type="image/png" href="https://azizsancaranadolu.meb.k12.tr/meb_iys_dosyalar/59/11/765062/dosyalar/2025_11/03215750_speaksmartaltlogo.png" />
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Theme Initialization -->
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (localTheme === 'dark' || !localTheme) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>

    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 3px; }
      .dark ::-webkit-scrollbar-thumb { background: #3a3a3a; }
      ::-webkit-scrollbar-thumb:hover { background: #b0b0b0; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #525252; }

      /* Card Utility — Notion-style clean surface */
      .card {
        background: #ffffff;
        border: 1px solid #e9e9e7;
        border-radius: 12px;
      }
      .dark .card {
        background: #212121;
        border: 1px solid #2e2e2e;
      }

      /* Legacy .glass → same as .card for backward compat */
      .glass {
        background: #ffffff;
        border: 1px solid #e9e9e7;
      }
      .dark .glass {
        background: #212121;
        border: 1px solid #2e2e2e;
      }

      /* Sidebar slide-in animation */
      @keyframes slideInLeft {
        from { transform: translateX(-100%); }
        to   { transform: translateX(0); }
      }
      .animate-slide-in-left {
        animation: slideInLeft 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* Fade-in (kept, shortened) */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.2s ease forwards; }

      /* Slide-up (kept for modal) */
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up { animation: slideUp 0.25s ease forwards; }

      /* Confetti (kept for compatibility) */
      @keyframes confettiFall {
        0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }
      .animate-confetti { animation: confettiFall 3s ease-out forwards; }

      /* Print */
      @media print {
        @page { size: A4; margin: 0.5cm; }
        body {
          background: white !important; color: black !important;
          margin: 0 !important; padding: 0 !important;
          height: auto !important; min-height: 0 !important;
        }
        #root { height: auto !important; min-height: 0 !important; }
        .fixed, .absolute-blob { display: none !important; }
      }
    </style>
</head>
  <body class="bg-[#f7f7f5] text-[#1a1a1a] dark:bg-[#191919] dark:text-[#e9e9e9] antialiased transition-colors duration-300 font-sans selection:bg-indigo-100 selection:text-indigo-900 dark:selection:bg-indigo-900/40 dark:selection:text-indigo-200">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
